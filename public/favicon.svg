<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#g)"/>
  
  <!-- Document icon -->
  <g transform="translate(25, 20)">
    <!-- Paper/Document shape -->
    <rect x="0" y="0" width="50" height="60" rx="2" fill="white" opacity="0.95"/>
    
    <!-- Folded corner effect -->
    <path d="M 50 0 L 45 5 L 50 5 Z" fill="white" opacity="0.7"/>
    
    <!-- Lines (text) -->
    <line x1="8" y1="15" x2="42" y2="15" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="8" y1="25" x2="42" y2="25" stroke="url(#g)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="35" x2="38" y2="35" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="43" x2="38" y2="43" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="8" y1="51" x2="35" y2="51" stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
